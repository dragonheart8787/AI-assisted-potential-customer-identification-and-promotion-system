name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install production deps (後端測試，含 sql.js)
        run: npm install --omit=dev

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests (起後端 + run-tests.js)
        run: npm run test:integration
        env:
          NO_OPEN_BROWSER: "1"
          CI: "true"
