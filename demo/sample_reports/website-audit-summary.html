<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>網站健檢摘要（範本）- 陽光咖啡館</title>
    <style>
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; max-width: 720px; margin: 40px auto; padding: 24px; line-height: 1.6; color: #1a1a1a; }
        h1 { font-size: 1.35rem; border-bottom: 2px solid #2563eb; padding-bottom: 8px; }
        .meta { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
        .score { font-size: 2rem; color: #16a34a; font-weight: 700; }
        ul { margin: 12px 0; }
        .issue { color: #dc2626; }
        .cta { margin-top: 32px; padding: 20px; background: #f1f5f9; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>
    <h1>網站健檢摘要</h1>
    <p class="meta"><strong>陽光咖啡館</strong> · https://example.com · 範本展示用</p>
    <p class="score">綜合評分：65 / 100</p>
    <h2>主要發現</h2>
    <ul>
        <li class="issue">首頁缺少明確 CTA（聯絡／預約）</li>
        <li class="issue">未偵測到聯絡表單</li>
        <li>載入時間尚可（&lt; 3 秒）</li>
        <li>已啟用 HTTPS</li>
    </ul>
    <h2>可能流失客戶的原因</h2>
    <ul>
        <li>訪客不易找到聯絡方式</li>
        <li>手機版體驗可再優化</li>
    </ul>
    <div class="cta">
        <strong>我可以怎麼幫你</strong>
        <p>可協助優化官網結構與轉換路徑，歡迎預約 15 分鐘免費諮詢。</p>
    </div>
    <p style="margin-top:24px;font-size:0.8rem;color:#94a3b8;">※ 本頁為學習歷程固定範本，非真實客戶資料。</p>
</body>
</html>
