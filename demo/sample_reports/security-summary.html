<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>資安初步分析摘要（範本）- 科技新創股份有限公司</title>
    <style>
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; max-width: 720px; margin: 40px auto; padding: 24px; line-height: 1.6; }
        h1 { font-size: 1.35rem; border-bottom: 2px solid #7c3aed; padding-bottom: 8px; }
        table { width: 100%; border-collapse: collapse; margin: 16px 0; }
        th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: left; }
        th { background: #f8fafc; }
        .ok { color: #16a34a; }
        .warn { color: #d97706; }
    </style>
</head>
<body>
    <h1>資安初步分析摘要</h1>
    <p><strong>科技新創股份有限公司</strong> · 範本展示用</p>
    <table>
        <tr><th>項目</th><th>狀態</th></tr>
        <tr><td>HTTPS</td><td class="ok">已啟用</td></tr>
        <tr><td>HSTS</td><td class="warn">未偵測</td></tr>
        <tr><td>X-Content-Type-Options</td><td class="ok">已設定</td></tr>
        <tr><td>X-Frame-Options</td><td class="warn">建議補強</td></tr>
        <tr><td>security.txt</td><td class="warn">未偵測</td></tr>
    </table>
    <h2>建議優先處理</h2>
    <ol>
        <li>設定 HSTS 降低降級攻擊風險</li>
        <li>補上 <code>/.well-known/security.txt</code> 聯絡管道</li>
    </ol>
    <p style="margin-top:24px;font-size:0.8rem;color:#94a3b8;">※ 本頁為學習歷程固定範本。</p>
</body>
