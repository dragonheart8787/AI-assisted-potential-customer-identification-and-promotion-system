<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統測試啟動頁面</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        
        .description {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        .test-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #495057;
            border: 2px solid #dee2e6;
        }
        
        .btn-secondary:hover {
            background: #e9ecef;
            border-color: #adb5bd;
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: 600;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 系統測試啟動頁面</h1>
        <p class="description">
            歡迎使用科技高層自動訊息發送系統測試工具！<br>
            請選擇您要進行的測試類型。
        </p>
        
        <div class="test-buttons">
            <a href="index.html" class="btn btn-primary">
                🚀 開啟主系統並執行全面測試
            </a>
            
            <a href="test-report.html" class="btn btn-secondary">
                📊 查看測試報告
            </a>
            
            <button class="btn btn-secondary" onclick="checkServer()">
                🔍 檢查伺服器狀態
            </button>
        </div>
        
        <div id="status" class="status info" style="display: none;">
            正在檢查系統狀態...
        </div>
    </div>
    
    <script>
        // 檢查伺服器狀態
        async function checkServer() {
            const statusDiv = document.getElementById('status');
            statusDiv.style.display = 'block';
            statusDiv.className = 'status info';
            statusDiv.textContent = '正在檢查伺服器狀態...';
            
            try {
                const response = await fetch('http://localhost:8000');
                if (response.ok) {
                    statusDiv.className = 'status success';
                    statusDiv.textContent = '✅ 伺服器運行正常！可以開始測試。';
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.textContent = '❌ 伺服器回應異常。';
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ 無法連接到伺服器。請確保伺服器正在運行。';
            }
        }
        
        // 頁面載入時自動檢查伺服器狀態
        window.addEventListener('load', checkServer);
    </script>
</body>
</html>
