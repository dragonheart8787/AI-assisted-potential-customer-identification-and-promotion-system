<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI 儀表板 - 推廣中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; margin: 0; padding: 24px; background: #0f0f12; color: #e4e4e7; }
        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .badge { display: inline-block; background: #7c3aed; color: #fff; font-size: 0.75rem; padding: 4px 10px; border-radius: 999px; margin-left: 8px; vertical-align: middle; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
        .card { background: #18181b; border-radius: 12px; padding: 18px; border: 1px solid #27272a; }
        .card h3 { font-size: 0.8rem; color: #a1a1aa; margin: 0 0 6px 0; font-weight: 500; }
        .card .val { font-size: 1.65rem; font-weight: 700; color: #22c55e; }
        .card .val.warn { color: #f59e0b; }
        .card .val.low { color: #94a3b8; }
        .section { margin-bottom: 28px; }
        .section h2 { font-size: 1rem; color: #a1a1aa; margin-bottom: 14px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #27272a; }
        th { color: #71717a; font-weight: 500; }
        .muted { color: #71717a; font-size: 0.88rem; }
        .refresh { margin-bottom: 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .refresh button { background: #3b82f6; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; }
        .bar-wrap { margin: 8px 0; }
        .bar-label { display: flex; justify-content: space-between; font-size: 0.82rem; color: #a1a1aa; margin-bottom: 4px; }
        .bar-track { height: 10px; background: #27272a; border-radius: 6px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #22c55e); border-radius: 6px; transition: width 0.3s; }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <h1>KPI 儀表板<span id="demo-badge" class="badge" style="display:none">Demo 模式</span></h1>
    <p class="muted" style="margin-top:0">名單、高分 Lead、需求分布、Pipeline、開信/點擊/跟進 — 適合學習歷程截圖</p>
    <div class="refresh">
        <button id="btn-refresh">重新整理</button>
        <span class="muted" id="hint-text"></span>
    </div>
    <div class="grid" id="kpi-cards"></div>
    <div class="section two-col">
        <div>
            <h2>Pipeline 階段</h2>
            <div id="pipeline-bars"></div>
        </div>
        <div>
            <h2>Website / Security 分數區間</h2>
            <p class="muted" style="margin:0 0 8px;font-size:0.82rem">依 CRM 客戶的 website_need_score、security_need_score（低 0–33／中 34–66／高 67–100）</p>
            <div id="website-score-bars"></div>
            <h3 style="font-size:0.85rem;color:#71717a;margin:16px 0 10px;font-weight:500">security_need_score</h3>
            <div id="security-score-bars"></div>
        </div>
    </div>
    <div class="section">
        <h2>產業分布</h2>
        <div id="industry-bars"></div>
    </div>
    <div class="section">
        <h2>每日事件（發信／開信／點擊）</h2>
        <table id="events-table">
            <thead><tr><th>日期</th><th>發信</th><th>開信</th><th>點擊</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="../crm-database.js"></script>
    <script src="../demo-mode.js"></script>
    <script src="../kpi-dashboard.js"></script>
</body>
</html>
