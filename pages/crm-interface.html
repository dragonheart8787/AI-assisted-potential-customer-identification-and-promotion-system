<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM客戶管理系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            min-height: 600px;
        }

        .sidebar {
            background: #f8f9fa;
            padding: 20px;
            border-right: 1px solid #e9ecef;
        }

        .content {
            padding: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-card h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .pipeline-board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .pipeline-column {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            min-height: 400px;
        }

        .pipeline-column h3 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e9ecef;
        }

        .customer-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .customer-card:hover {
            transform: translateY(-2px);
        }

        .customer-card h4 {
            color: #333;
            margin-bottom: 5px;
        }

        .customer-card .company {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .customer-card .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }

        .tag {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8em;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a6fd8;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-warning {
            background: #ffc107;
            color: #212529;
        }

        .btn-warning:hover {
            background: #e0a800;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-group textarea {
            height: 100px;
            resize: vertical;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #000;
        }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .filters h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .import-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .file-input {
            margin: 10px 0;
        }

        .file-input input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 2px dashed #ddd;
            border-radius: 6px;
            text-align: center;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #e9ecef;
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            border-bottom-color: #667eea;
            color: #667eea;
            font-weight: bold;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .interaction-history {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 10px;
        }

        .interaction-item {
            padding: 10px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .interaction-item:last-child {
            border-bottom: none;
        }

        .sentiment-positive {
            color: #28a745;
        }

        .sentiment-negative {
            color: #dc3545;
        }

        .sentiment-neutral {
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 CRM客戶管理系統</h1>
            <p>完整的客戶關係管理和推銷追蹤平台</p>
        </div>

        <div class="main-content">
            <div class="sidebar">
                <div class="filters">
                    <h3>🔍 篩選器</h3>
                    <div class="filter-row">
                        <div class="form-group">
                            <label>平台</label>
                            <select id="platform-filter">
                                <option value="all">所有平台</option>
                                <option value="email">Email</option>
                                <option value="linkedin">LinkedIn</option>
                                <option value="twitter">Twitter</option>
                                <option value="instagram">Instagram</option>
                                <option value="facebook">Facebook</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>標籤</label>
                            <select id="tag-filter">
                                <option value="all">所有標籤</option>
                            </select>
                        </div>
                    </div>
                    <div class="filter-row">
                        <div class="form-group">
                            <label>Pipeline階段</label>
                            <select id="stage-filter">
                                <option value="all">所有階段</option>
                                <option value="new">新名單</option>
                                <option value="contacted">已聯繫</option>
                                <option value="responded">已回覆</option>
                                <option value="interested">有興趣</option>
                                <option value="qualified">已確認</option>
                                <option value="closed">成交</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>情感</label>
                            <select id="sentiment-filter">
                                <option value="all">所有情感</option>
                                <option value="positive">正面</option>
                                <option value="negative">負面</option>
                                <option value="neutral">中性</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="applyFilters()">應用篩選</button>
                </div>

                <div class="import-section">
                    <h3>📥 匯入客戶</h3>
                    <div class="file-input">
                        <input type="file" id="csv-file" accept=".csv" onchange="handleFileImport()">
                    </div>
                    <button class="btn btn-success" onclick="downloadTemplate()">下載範本</button>
                </div>

                <div class="import-section">
                    <h3>📤 匯出資料</h3>
                    <button class="btn btn-warning" onclick="exportCustomers()">匯出客戶資料</button>
                    <button class="btn btn-warning" onclick="exportInteractions()">匯出互動記錄</button>
                </div>
            </div>

            <div class="content">
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('dashboard')">📊 儀表板</div>
                    <div class="tab" onclick="switchTab('pipeline')">🔄 Pipeline</div>
                    <div class="tab" onclick="switchTab('customers')">👥 客戶列表</div>
                    <div class="tab" onclick="switchTab('ab-testing')">🧪 A/B測試</div>
                    <div class="tab" onclick="switchTab('followup')">⏰ 跟進管理</div>
                    <div class="tab" onclick="switchTab('inbox')">📬 統一收件箱</div>
                </div>

                <!-- 儀表板 -->
                <div id="dashboard" class="tab-content active">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>總客戶數</h3>
                            <div class="number" id="total-customers">0</div>
                        </div>
                        <div class="stat-card">
                            <h3>新名單</h3>
                            <div class="number" id="new-customers">0</div>
                        </div>
                        <div class="stat-card">
                            <h3>已聯繫</h3>
                            <div class="number" id="contacted-customers">0</div>
                        </div>
                        <div class="stat-card">
                            <h3>已回覆</h3>
                            <div class="number" id="responded-customers">0</div>
                        </div>
                        <div class="stat-card">
                            <h3>有興趣</h3>
                            <div class="number" id="interested-customers">0</div>
                        </div>
                        <div class="stat-card">
                            <h3>成交率</h3>
                            <div class="number" id="conversion-rate">0%</div>
                        </div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>聯絡率</h3>
                            <div class="number" id="contact-rate">0%</div>
                        </div>
                        <div class="stat-card">
                            <h3>回覆率</h3>
                            <div class="number" id="response-rate">0%</div>
                        </div>
                        <div class="stat-card">
                            <h3>興趣率</h3>
                            <div class="number" id="interest-rate">0%</div>
                        </div>
                        <div class="stat-card">
                            <h3>確認率</h3>
                            <div class="number" id="qualification-rate">0%</div>
                        </div>
                    </div>
                </div>

                <!-- Pipeline -->
                <div id="pipeline" class="tab-content">
                    <div class="pipeline-board" id="pipeline-board">
                        <!-- 動態生成Pipeline欄位 -->
                    </div>
                </div>

                <!-- 客戶列表 -->
                <div id="customers" class="tab-content">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>客戶列表</h3>
                        <button class="btn btn-primary" onclick="openAddCustomerModal()">+ 添加客戶</button>
                    </div>
                    <div id="customers-list">
                        <!-- 動態生成客戶列表 -->
                    </div>
                </div>

                <!-- A/B測試 -->
                <div id="ab-testing" class="tab-content">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>A/B測試</h3>
                        <button class="btn btn-primary" onclick="openCreateTestModal()">+ 創建測試</button>
                    </div>
                    <div id="ab-tests-list">
                        <!-- 動態生成A/B測試列表 -->
                    </div>
                </div>

                <!-- 跟進管理 -->
                <div id="followup" class="tab-content">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>跟進管理</h3>
                        <button class="btn btn-primary" onclick="openCreateRuleModal()">+ 創建規則</button>
                    </div>
                    <div id="followup-rules-list">
                        <!-- 動態生成跟進規則列表 -->
                    </div>
                </div>

                <!-- 統一收件箱 -->
                <div id="inbox" class="tab-content">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>統一收件箱</h3>
                        <button class="btn btn-primary" onclick="refreshInbox()">🔄 刷新</button>
                    </div>
                    <div id="inbox-messages">
                        <!-- 動態生成收件箱訊息 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加客戶模態框 -->
    <div id="add-customer-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('add-customer-modal')">&times;</span>
            <h2>添加客戶</h2>
            <form id="add-customer-form">
                <div class="form-group">
                    <label>姓名 *</label>
                    <input type="text" id="customer-name" required>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="customer-email" required>
                </div>
                <div class="form-group">
                    <label>公司</label>
                    <input type="text" id="customer-company">
                </div>
                <div class="form-group">
                    <label>職位</label>
                    <input type="text" id="customer-title">
                </div>
                <div class="form-group">
                    <label>電話</label>
                    <input type="tel" id="customer-phone">
                </div>
                <div class="form-group">
                    <label>LinkedIn</label>
                    <input type="url" id="customer-linkedin">
                </div>
                <div class="form-group">
                    <label>Twitter</label>
                    <input type="text" id="customer-twitter">
                </div>
                <div class="form-group">
                    <label>標籤</label>
                    <input type="text" id="customer-tags" placeholder="用逗號分隔多個標籤">
                </div>
                <div style="text-align: right;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('add-customer-modal')">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 客戶詳情模態框 -->
    <div id="customer-detail-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('customer-detail-modal')">&times;</span>
            <div id="customer-detail-content">
                <!-- 動態生成客戶詳情 -->
            </div>
        </div>
    </div>

    <script src="../crm-database.js"></script>
    <script src="../ab-testing.js"></script>
    <script src="../auto-followup.js"></script>
    <script src="../unified-inbox.js"></script>
    <script>
        // CRM介面管理
        class CRMInterface {
            constructor() {
                this.currentTab = 'dashboard';
                this.init();
            }

            init() {
                this.loadData();
                this.setupEventListeners();
                this.updateDashboard();
                this.updatePipeline();
                this.updateCustomersList();
                this.updateABTestsList();
                this.updateFollowupRulesList();
                this.updateInboxMessages();
            }

            loadData() {
                // 載入標籤選項
                this.updateTagFilter();
            }

            setupEventListeners() {
                // 監聽客戶更新事件
                document.addEventListener('customerAdded', () => {
                    this.updateDashboard();
                    this.updatePipeline();
                    this.updateCustomersList();
                });

                document.addEventListener('customerUpdated', () => {
                    this.updateDashboard();
                    this.updatePipeline();
                    this.updateCustomersList();
                });

                // 監聽A/B測試事件
                document.addEventListener('testCreated', () => {
                    this.updateABTestsList();
                });

                // 監聽跟進規則事件
                document.addEventListener('followupRuleCreated', () => {
                    this.updateFollowupRulesList();
                });

                // 監聽收件箱事件
                document.addEventListener('newMessage', () => {
                    this.updateInboxMessages();
                });
            }

            // 更新儀表板
            updateDashboard() {
                if (!window.crmDatabase) return;

                const metrics = window.crmDatabase.getPerformanceMetrics();
                const pipelineStats = window.crmDatabase.getPipelineStats();

                document.getElementById('total-customers').textContent = metrics.totalCustomers;
                document.getElementById('new-customers').textContent = pipelineStats.new || 0;
                document.getElementById('contacted-customers').textContent = pipelineStats.contacted || 0;
                document.getElementById('responded-customers').textContent = pipelineStats.responded || 0;
                document.getElementById('interested-customers').textContent = pipelineStats.interested || 0;
                document.getElementById('conversion-rate').textContent = metrics.conversionRate + '%';
                document.getElementById('contact-rate').textContent = metrics.contactRate + '%';
                document.getElementById('response-rate').textContent = metrics.responseRate + '%';
                document.getElementById('interest-rate').textContent = metrics.interestRate + '%';
                document.getElementById('qualification-rate').textContent = metrics.qualificationRate + '%';
            }

            // 更新Pipeline
            updatePipeline() {
                if (!window.crmDatabase) return;

                const pipelineBoard = document.getElementById('pipeline-board');
                const stages = window.crmDatabase.pipelineStages;

                pipelineBoard.innerHTML = stages.map(stage => `
                    <div class="pipeline-column">
                        <h3 style="color: ${stage.color}">${stage.name}</h3>
                        <div id="stage-${stage.id}">
                            ${this.renderCustomersInStage(stage.id)}
                        </div>
                    </div>
                `).join('');
            }

            // 渲染階段中的客戶
            renderCustomersInStage(stageId) {
                if (!window.crmDatabase) return '';

                const customers = window.crmDatabase.filterCustomersByStage(stageId);
                return customers.map(customer => `
                    <div class="customer-card" onclick="showCustomerDetail('${customer.id}')">
                        <h4>${customer.name}</h4>
                        <div class="company">${customer.company}</div>
                        <div class="tags">
                            ${customer.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                        <div style="font-size: 0.8em; color: #666;">
                            互動: ${customer.interactionCount} 次
                        </div>
                    </div>
                `).join('');
            }

            // 更新客戶列表
            updateCustomersList() {
                if (!window.crmDatabase) return;

                const customersList = document.getElementById('customers-list');
                const customers = window.crmDatabase.getAllCustomers();

                customersList.innerHTML = customers.map(customer => `
                    <div class="customer-card" onclick="showCustomerDetail('${customer.id}')">
                        <h4>${customer.name}</h4>
                        <div class="company">${customer.company} - ${customer.title}</div>
                        <div class="tags">
                            ${customer.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                        <div style="font-size: 0.8em; color: #666;">
                            ${customer.email} | 互動: ${customer.interactionCount} 次
                        </div>
                    </div>
                `).join('');
            }

            // 更新A/B測試列表
            updateABTestsList() {
                if (!window.abTestingSystem) return;

                const testsList = document.getElementById('ab-tests-list');
                const tests = window.abTestingSystem.getAllTests();

                testsList.innerHTML = tests.map(test => `
                    <div class="customer-card">
                        <h4>${test.name}</h4>
                        <p>${test.description}</p>
                        <div style="font-size: 0.8em; color: #666;">
                            狀態: ${test.status} | 變體數: ${test.variants.length}
                        </div>
                        <div style="margin-top: 10px;">
                            <button class="btn btn-primary" onclick="viewTestResults('${test.id}')">查看結果</button>
                            <button class="btn btn-warning" onclick="editTest('${test.id}')">編輯</button>
                        </div>
                    </div>
                `).join('');
            }

            // 更新跟進規則列表
            updateFollowupRulesList() {
                if (!window.autoFollowupSystem) return;

                const rulesList = document.getElementById('followup-rules-list');
                const rules = window.autoFollowupSystem.followupRules;

                rulesList.innerHTML = rules.map(rule => `
                    <div class="customer-card">
                        <h4>${rule.name}</h4>
                        <p>${rule.description}</p>
                        <div style="font-size: 0.8em; color: #666;">
                            狀態: ${rule.isActive ? '啟用' : '停用'} | 優先級: ${rule.priority}
                        </div>
                        <div style="margin-top: 10px;">
                            <button class="btn btn-primary" onclick="editRule('${rule.id}')">編輯</button>
                            <button class="btn btn-danger" onclick="deleteRule('${rule.id}')">刪除</button>
                        </div>
                    </div>
                `).join('');
            }

            // 更新收件箱訊息
            updateInboxMessages() {
                if (!window.unifiedInbox) return;

                const inboxMessages = document.getElementById('inbox-messages');
                const messages = window.unifiedInbox.getMessages();

                inboxMessages.innerHTML = messages.map(message => `
                    <div class="customer-card">
                        <h4>${message.subject || '無主旨'}</h4>
                        <div style="font-size: 0.8em; color: #666;">
                            來自: ${message.from} | 平台: ${message.platform} | 
                            時間: ${new Date(message.receivedAt).toLocaleString()}
                        </div>
                        <div style="margin-top: 10px;">
                            <button class="btn btn-primary" onclick="replyToMessage('${message.id}')">回覆</button>
                            <button class="btn btn-warning" onclick="markAsRead('${message.id}')">標記已讀</button>
                        </div>
                    </div>
                `).join('');
            }

            // 更新標籤篩選器
            updateTagFilter() {
                if (!window.crmDatabase) return;

                const tagFilter = document.getElementById('tag-filter');
                const tags = window.crmDatabase.getAllTags();

                tagFilter.innerHTML = '<option value="all">所有標籤</option>' +
                    tags.map(tag => `<option value="${tag}">${tag}</option>`).join('');
            }
        }

        // 全域函數
        function switchTab(tabName) {
            // 隱藏所有標籤內容
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });

            // 移除所有標籤的active類
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });

            // 顯示選中的標籤內容
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            // 更新對應的內容
            if (window.crmInterface) {
                switch(tabName) {
                    case 'dashboard':
                        window.crmInterface.updateDashboard();
                        break;
                    case 'pipeline':
                        window.crmInterface.updatePipeline();
                        break;
                    case 'customers':
                        window.crmInterface.updateCustomersList();
                        break;
                    case 'ab-testing':
                        window.crmInterface.updateABTestsList();
                        break;
                    case 'followup':
                        window.crmInterface.updateFollowupRulesList();
                        break;
                    case 'inbox':
                        window.crmInterface.updateInboxMessages();
                        break;
                }
            }
        }

        function openAddCustomerModal() {
            document.getElementById('add-customer-modal').style.display = 'block';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function showCustomerDetail(customerId) {
            if (!window.crmDatabase) return;

            const customer = window.crmDatabase.findCustomerById(customerId);
            if (!customer) return;

            const interactions = window.crmDatabase.getCustomerInteractions(customerId);
            const sentiment = window.crmDatabase.analyzeCustomerSentiment(customerId);

            document.getElementById('customer-detail-content').innerHTML = `
                <h2>${customer.name}</h2>
                <div style="margin: 20px 0;">
                    <p><strong>公司:</strong> ${customer.company}</p>
                    <p><strong>職位:</strong> ${customer.title}</p>
                    <p><strong>Email:</strong> ${customer.email}</p>
                    <p><strong>電話:</strong> ${customer.phone || '未提供'}</p>
                    <p><strong>LinkedIn:</strong> ${customer.linkedin || '未提供'}</p>
                    <p><strong>Twitter:</strong> ${customer.twitter || '未提供'}</p>
                    <p><strong>階段:</strong> ${customer.stage}</p>
                    <p><strong>標籤:</strong> ${customer.tags.join(', ')}</p>
                    <p><strong>情感分析:</strong> <span class="sentiment-${sentiment}">${sentiment}</span></p>
                </div>
                <div>
                    <h3>互動歷史</h3>
                    <div class="interaction-history">
                        ${interactions.map(interaction => `
                            <div class="interaction-item">
                                <div>
                                    <strong>${interaction.type}</strong> - ${interaction.platform}
                                    <br>
                                    <small>${new Date(interaction.timestamp).toLocaleString()}</small>
                                </div>
                                <div class="sentiment-${interaction.sentiment}">
                                    ${interaction.sentiment}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            document.getElementById('customer-detail-modal').style.display = 'block';
        }

        function applyFilters() {
            // 實現篩選邏輯
            console.log('應用篩選器');
        }

        function handleFileImport() {
            const fileInput = document.getElementById('csv-file');
            const file = fileInput.files[0];
            
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const csvData = e.target.result;
                    if (window.crmDatabase) {
                        const result = window.crmDatabase.importFromCSV(csvData);
                        alert(`匯入完成！成功: ${result.importedCustomers.length} 個客戶`);
                        window.crmInterface.updateDashboard();
                        window.crmInterface.updatePipeline();
                        window.crmInterface.updateCustomersList();
                    }
                };
                reader.readAsText(file);
            }
        }

        function downloadTemplate() {
            const template = '姓名,Email,公司,職位,電話,LinkedIn,Twitter\n';
            const blob = new Blob([template], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '客戶資料範本.csv';
            a.click();
            window.URL.revokeObjectURL(url);
        }

        function exportCustomers() {
            if (window.crmDatabase) {
                const csvData = window.crmDatabase.exportToCSV();
                const blob = new Blob([csvData], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = '客戶資料.csv';
                a.click();
                window.URL.revokeObjectURL(url);
            }
        }

        function exportInteractions() {
            // 實現互動記錄匯出
            console.log('匯出互動記錄');
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            window.crmInterface = new CRMInterface();
        });

        // 表單提交處理
        document.getElementById('add-customer-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const customerData = {
                name: document.getElementById('customer-name').value,
                email: document.getElementById('customer-email').value,
                company: document.getElementById('customer-company').value,
                title: document.getElementById('customer-title').value,
                phone: document.getElementById('customer-phone').value,
                linkedin: document.getElementById('customer-linkedin').value,
                twitter: document.getElementById('customer-twitter').value,
                tags: document.getElementById('customer-tags').value.split(',').map(tag => tag.trim()).filter(tag => tag)
            };

            if (window.crmDatabase) {
                try {
                    window.crmDatabase.addCustomer(customerData);
                    alert('客戶添加成功！');
                    closeModal('add-customer-modal');
                    document.getElementById('add-customer-form').reset();
                } catch (error) {
                    alert('添加失敗: ' + error.message);
                }
            }
        });
    </script>
</body>
</html>
