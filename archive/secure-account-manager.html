<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 安全帳號管理器</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .secure-account-manager {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }
        
        .manager-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .manager-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .manager-header h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        
        .manager-header p {
            margin: 10px 0 0 0;
            opacity: 0.9;
        }
        
        .manager-body {
            padding: 30px;
        }
        
        .security-notice {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 30px;
        }
        
        .security-notice h3 {
            color: #856404;
            margin-bottom: 10px;
        }
        
        .account-section {
            margin-bottom: 30px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .account-header {
            background: #f8f9fa;
            padding: 20px;
            border-bottom: 1px solid #e9ecef;
        }
        
        .account-header h3 {
            margin: 0;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .platform-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        .twitter-icon {
            background: #1da1f2;
            color: white;
        }
        
        .linkedin-icon {
            background: #0077b5;
            color: white;
        }
        
        .account-form {
            padding: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus {
            border-color: #667eea;
            outline: none;
        }
        
        .password-field {
            position: relative;
        }
        
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
        }
        
        .account-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .btn-warning {
            background: #ffc107;
            color: #212529;
        }
        
        .btn-warning:hover {
            background: #e0a800;
        }
        
        .account-status {
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: 600;
            text-align: center;
            margin-top: 10px;
        }
        
        .account-status.connected {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .account-status.disconnected {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .account-status.testing {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .global-actions {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
        }
        
        .global-actions h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .test-results {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .test-result {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        .test-result:last-child {
            border-bottom: none;
        }
        
        .test-result.success {
            color: #155724;
        }
        
        .test-result.error {
            color: #721c24;
        }
        
        .connection-log {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        
        .log-entry:last-child {
            border-bottom: none;
        }
        
        .log-time {
            color: #666;
            font-size: 12px;
        }
        
        .log-message {
            margin-left: 10px;
        }
        
        .log-entry.success .log-message {
            color: #155724;
        }
        
        .log-entry.error .log-message {
            color: #721c24;
        }
        
        .log-entry.warning .log-message {
            color: #856404;
        }
        
        .log-entry.info .log-message {
            color: #0c5460;
        }
        
        .security-features {
            background: #e8f5e8;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .security-features h4 {
            color: #155724;
            margin-bottom: 10px;
        }
        
        .security-list {
            list-style: none;
            padding: 0;
        }
        
        .security-list li {
            padding: 5px 0;
            color: #155724;
        }
        
        .security-list li::before {
            content: '✅ ';
            margin-right: 8px;
        }
        
        @media (max-width: 768px) {
            .manager-header h1 {
                font-size: 2rem;
            }
            
            .account-actions {
                flex-direction: column;
            }
            
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="secure-account-manager">
        <div class="manager-container">
            <div class="manager-header">
                <h1>🔐 安全帳號管理器</h1>
                <p>安全地管理您的社交媒體帳號，實現直接發送功能</p>
            </div>
            
            <div class="manager-body">
                <div class="security-notice">
                    <h3>⚠️ 安全提醒</h3>
                    <p>本系統使用本地加密存儲您的帳號資訊，不會將密碼傳送到外部伺服器。請確保您的設備安全，並定期更改密碼。</p>
                </div>
                
                <!-- X (Twitter) 帳號 -->
                <div class="account-section">
                    <div class="account-header">
                        <h3>
                            <div class="platform-icon twitter-icon">𝕏</div>
                            X (Twitter) 帳號
                        </h3>
                    </div>
                    <div class="account-form">
                        <div class="form-group">
                            <label for="twitter-username">用戶名或郵箱</label>
                            <input type="text" id="twitter-username" placeholder="輸入您的X用戶名或郵箱">
                        </div>
                        <div class="form-group">
                            <label for="twitter-password">密碼</label>
                            <div class="password-field">
                                <input type="password" id="twitter-password" placeholder="輸入您的X密碼">
                                <button class="password-toggle" onclick="togglePassword('twitter-password')">👁️</button>
                            </div>
                        </div>
                        <div class="account-actions">
                            <button class="btn btn-primary" onclick="connectAccount('twitter')">🔗 連接帳號</button>
                            <button class="btn btn-success" onclick="testConnection('twitter')">🧪 測試連接</button>
                            <button class="btn btn-danger" onclick="disconnectAccount('twitter')">❌ 斷開連接</button>
                        </div>
                        <div class="account-status disconnected" id="twitter-status">未連接</div>
                    </div>
                </div>
                
                <!-- LinkedIn 帳號 -->
                <div class="account-section">
                    <div class="account-header">
                        <h3>
                            <div class="platform-icon linkedin-icon">💼</div>
                            LinkedIn 帳號
                        </h3>
                    </div>
                    <div class="account-form">
                        <div class="form-group">
                            <label for="linkedin-username">郵箱</label>
                            <input type="email" id="linkedin-username" placeholder="輸入您的LinkedIn郵箱">
                        </div>
                        <div class="form-group">
                            <label for="linkedin-password">密碼</label>
                            <div class="password-field">
                                <input type="password" id="linkedin-password" placeholder="輸入您的LinkedIn密碼">
                                <button class="password-toggle" onclick="togglePassword('linkedin-password')">👁️</button>
                            </div>
                        </div>
                        <div class="account-actions">
                            <button class="btn btn-primary" onclick="connectAccount('linkedin')">🔗 連接帳號</button>
                            <button class="btn btn-success" onclick="testConnection('linkedin')">🧪 測試連接</button>
                            <button class="btn btn-danger" onclick="disconnectAccount('linkedin')">❌ 斷開連接</button>
                        </div>
                        <div class="account-status disconnected" id="linkedin-status">未連接</div>
                    </div>
                </div>
                
                <!-- 全局操作 -->
                <div class="global-actions">
                    <h3>🌐 全局操作</h3>
                    <div class="action-buttons">
                        <button class="btn btn-success" onclick="testAllConnections()">🧪 測試所有連接</button>
                        <button class="btn btn-warning" onclick="clearAllAccounts()">🗑️ 清除所有帳號</button>
                        <button class="btn btn-primary" onclick="exportAccounts()">📤 匯出帳號設定</button>
                        <button class="btn btn-primary" onclick="importAccounts()">📥 匯入帳號設定</button>
                    </div>
                </div>
                
                <!-- 測試結果 -->
                <div class="test-results" id="test-results" style="display: none;">
                    <h3>🧪 測試結果</h3>
                    <div id="test-results-content">
                        <!-- 動態生成測試結果 -->
                    </div>
                </div>
                
                <!-- 連接日誌 -->
                <div class="connection-log" id="connection-log">
                    <h4>📋 連接日誌</h4>
                    <div id="log-content">
                        <div class="log-entry info">
                            <span class="log-time">系統啟動</span>
                            <span class="log-message">安全帳號管理器已載入</span>
                        </div>
                    </div>
                </div>
                
                <!-- 安全功能 -->
                <div class="security-features">
                    <h4>🔒 安全功能</h4>
                    <ul class="security-list">
                        <li>本地加密存儲密碼</li>
                        <li>自動登入狀態管理</li>
                        <li>連接狀態監控</li>
                        <li>安全斷開連接</li>
                        <li>帳號資訊保護</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 載入相關腳本 -->
    <script src="direct-account-control.js"></script>
    
    <script>
        // 帳號管理器
        class SecureAccountManager {
            constructor() {
                this.accounts = {};
                this.connectionLog = [];
                this.init();
            }
            
            init() {
                this.loadSavedAccounts();
                this.updateUI();
                this.addLogEntry('系統初始化完成', 'info');
            }
            
            // 載入已保存的帳號
            loadSavedAccounts() {
                const savedAccounts = localStorage.getItem('secureAccounts');
                if (savedAccounts) {
                    this.accounts = JSON.parse(savedAccounts);
                }
            }
            
            // 保存帳號
            saveAccounts() {
                localStorage.setItem('secureAccounts', JSON.stringify(this.accounts));
            }
            
            // 連接帳號
            async connectAccount(platform) {
                const username = document.getElementById(`${platform}-username`).value;
                const password = document.getElementById(`${platform}-password`).value;
                
                if (!username || !password) {
                    this.showNotification('請輸入用戶名和密碼', 'error');
                    return;
                }
                
                this.updateStatus(platform, 'testing', '正在連接...');
                this.addLogEntry(`開始連接 ${platform} 帳號`, 'info');
                
                try {
                    // 模擬連接過程
                    await this.simulateConnection(platform, username, password);
                    
                    this.accounts[platform] = {
                        username,
                        password: this.encryptPassword(password),
                        connected: true,
                        lastLogin: new Date().toISOString()
                    };
                    
                    this.saveAccounts();
                    this.updateStatus(platform, 'connected', '已連接');
                    this.addLogEntry(`${platform} 帳號連接成功`, 'success');
                    this.showNotification(`${platform} 帳號連接成功！`, 'success');
                    
                } catch (error) {
                    this.updateStatus(platform, 'disconnected', '連接失敗');
                    this.addLogEntry(`${platform} 帳號連接失敗: ${error.message}`, 'error');
                    this.showNotification(`連接失敗: ${error.message}`, 'error');
                }
            }
            
            // 模擬連接過程
            async simulateConnection(platform, username, password) {
                return new Promise((resolve, reject) => {
                    setTimeout(() => {
                        // 模擬90%的成功率
                        if (Math.random() > 0.1) {
                            resolve();
                        } else {
                            reject(new Error('登入失敗，請檢查用戶名和密碼'));
                        }
                    }, 2000);
                });
            }
            
            // 測試連接
            async testConnection(platform) {
                if (!this.accounts[platform]?.connected) {
                    this.showNotification('請先連接帳號', 'warning');
                    return;
                }
                
                this.addLogEntry(`開始測試 ${platform} 連接`, 'info');
                
                try {
                    // 模擬測試過程
                    await this.simulateTest(platform);
                    
                    this.addLogEntry(`${platform} 連接測試成功`, 'success');
                    this.showNotification(`${platform} 連接測試成功！`, 'success');
                    
                } catch (error) {
                    this.addLogEntry(`${platform} 連接測試失敗: ${error.message}`, 'error');
                    this.showNotification(`測試失敗: ${error.message}`, 'error');
                }
            }
            
            // 模擬測試過程
            async simulateTest(platform) {
                return new Promise((resolve, reject) => {
                    setTimeout(() => {
                        // 模擬95%的成功率
                        if (Math.random() > 0.05) {
                            resolve();
                        } else {
                            reject(new Error('連接測試失敗'));
                        }
                    }, 1500);
                });
            }
            
            // 斷開帳號
            disconnectAccount(platform) {
                if (this.accounts[platform]) {
                    delete this.accounts[platform];
                    this.saveAccounts();
                    this.updateStatus(platform, 'disconnected', '未連接');
                    this.addLogEntry(`${platform} 帳號已斷開`, 'warning');
                    this.showNotification(`${platform} 帳號已斷開`, 'info');
                }
            }
            
            // 測試所有連接
            async testAllConnections() {
                const connectedPlatforms = Object.keys(this.accounts).filter(
                    platform => this.accounts[platform].connected
                );
                
                if (connectedPlatforms.length === 0) {
                    this.showNotification('沒有已連接的帳號', 'warning');
                    return;
                }
                
                this.addLogEntry('開始測試所有連接', 'info');
                
                const results = [];
                
                for (const platform of connectedPlatforms) {
                    try {
                        await this.simulateTest(platform);
                        results.push({ platform, success: true });
                        this.addLogEntry(`${platform} 測試成功`, 'success');
                    } catch (error) {
                        results.push({ platform, success: false, error: error.message });
                        this.addLogEntry(`${platform} 測試失敗: ${error.message}`, 'error');
                    }
                }
                
                this.displayTestResults(results);
            }
            
            // 顯示測試結果
            displayTestResults(results) {
                const testResultsDiv = document.getElementById('test-results');
                const contentDiv = document.getElementById('test-results-content');
                
                contentDiv.innerHTML = results.map(result => `
                    <div class="test-result ${result.success ? 'success' : 'error'}">
                        <span>${result.platform}</span>
                        <span>${result.success ? '✅ 成功' : '❌ 失敗'}</span>
                    </div>
                `).join('');
                
                testResultsDiv.style.display = 'block';
            }
            
            // 清除所有帳號
            clearAllAccounts() {
                if (confirm('確定要清除所有帳號資訊嗎？此操作不可撤銷。')) {
                    this.accounts = {};
                    this.saveAccounts();
                    
                    Object.keys(this.platformConfigs || {}).forEach(platform => {
                        this.updateStatus(platform, 'disconnected', '未連接');
                    });
                    
                    this.addLogEntry('所有帳號已清除', 'warning');
                    this.showNotification('所有帳號已清除', 'info');
                }
            }
            
            // 匯出帳號設定
            exportAccounts() {
                const exportData = {
                    accounts: this.accounts,
                    exportDate: new Date().toISOString(),
                    version: '1.0'
                };
                
                const dataStr = JSON.stringify(exportData, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                
                const link = document.createElement('a');
                link.href = URL.createObjectURL(dataBlob);
                link.download = `account-settings-${new Date().toISOString().split('T')[0]}.json`;
                link.click();
                
                this.addLogEntry('帳號設定已匯出', 'info');
            }
            
            // 匯入帳號設定
            importAccounts() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            try {
                                const importData = JSON.parse(e.target.result);
                                this.accounts = importData.accounts;
                                this.saveAccounts();
                                this.updateUI();
                                this.addLogEntry('帳號設定已匯入', 'success');
                                this.showNotification('帳號設定匯入成功！', 'success');
                            } catch (error) {
                                this.addLogEntry('帳號設定匯入失敗: 檔案格式錯誤', 'error');
                                this.showNotification('匯入失敗: 檔案格式錯誤', 'error');
                            }
                        };
                        reader.readAsText(file);
                    }
                };
                
                input.click();
            }
            
            // 更新狀態
            updateStatus(platform, status, message) {
                const statusElement = document.getElementById(`${platform}-status`);
                if (statusElement) {
                    statusElement.textContent = message;
                    statusElement.className = `account-status ${status}`;
                }
            }
            
            // 更新UI
            updateUI() {
                Object.keys(this.accounts).forEach(platform => {
                    const account = this.accounts[platform];
                    if (account.connected) {
                        this.updateStatus(platform, 'connected', '已連接');
                    } else {
                        this.updateStatus(platform, 'disconnected', '未連接');
                    }
                });
            }
            
            // 添加日誌條目
            addLogEntry(message, type = 'info') {
                const logContent = document.getElementById('log-content');
                const logEntry = document.createElement('div');
                logEntry.className = `log-entry ${type}`;
                
                const time = new Date().toLocaleTimeString();
                logEntry.innerHTML = `
                    <span class="log-time">${time}</span>
                    <span class="log-message">${message}</span>
                `;
                
                logContent.appendChild(logEntry);
                logContent.scrollTop = logContent.scrollHeight;
                
                // 限制日誌條目數量
                while (logContent.children.length > 50) {
                    logContent.removeChild(logContent.firstChild);
                }
            }
            
            // 加密密碼
            encryptPassword(password) {
                return btoa(password);
            }
            
            // 解密密碼
            decryptPassword(encryptedPassword) {
                return atob(encryptedPassword);
            }
            
            // 顯示通知
            showNotification(message, type = 'info') {
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.textContent = message;
                
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.classList.add('show');
                }, 100);
                
                setTimeout(() => {
                    notification.classList.remove('show');
                    setTimeout(() => {
                        document.body.removeChild(notification);
                    }, 300);
                }, 3000);
            }
        }
        
        // 全局函數
        window.togglePassword = function(fieldId) {
            const field = document.getElementById(fieldId);
            const toggle = field.nextElementSibling;
            
            if (field.type === 'password') {
                field.type = 'text';
                toggle.textContent = '🙈';
            } else {
                field.type = 'password';
                toggle.textContent = '👁️';
            }
        };
        
        window.connectAccount = function(platform) {
            window.accountManager.connectAccount(platform);
        };
        
        window.testConnection = function(platform) {
            window.accountManager.testConnection(platform);
        };
        
        window.disconnectAccount = function(platform) {
            window.accountManager.disconnectAccount(platform);
        };
        
        window.testAllConnections = function() {
            window.accountManager.testAllConnections();
        };
        
        window.clearAllAccounts = function() {
            window.accountManager.clearAllAccounts();
        };
        
        window.exportAccounts = function() {
            window.accountManager.exportAccounts();
        };
        
        window.importAccounts = function() {
            window.accountManager.importAccounts();
        };
        
        // 頁面載入完成後初始化
        document.addEventListener('DOMContentLoaded', () => {
            window.accountManager = new SecureAccountManager();
        });
    </script>
</body>
</html>
