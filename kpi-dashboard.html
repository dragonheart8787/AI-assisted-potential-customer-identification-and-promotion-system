<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI 儀表板 - 推廣中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; margin: 0; padding: 24px; background: #0f0f12; color: #e4e4e7; }
        h1 { font-size: 1.5rem; margin-bottom: 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .card { background: #18181b; border-radius: 12px; padding: 20px; border: 1px solid #27272a; }
        .card h3 { font-size: 0.85rem; color: #a1a1aa; margin: 0 0 8px 0; font-weight: 500; }
        .card .val { font-size: 1.8rem; font-weight: 700; color: #22c55e; }
        .card .val.warn { color: #f59e0b; }
        .card .val.low { color: #94a3b8; }
        .section { margin-bottom: 24px; }
        .section h2 { font-size: 1rem; color: #a1a1aa; margin-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #27272a; }
        th { color: #71717a; font-weight: 500; font-size: 0.85rem; }
        .muted { color: #71717a; font-size: 0.9rem; }
        .refresh { margin-bottom: 16px; }
        .refresh button { background: #3b82f6; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; }
        .refresh button:hover { background: #2563eb; }
    </style>
</head>
<body>
    <h1>KPI 儀表板</h1>
    <div class="refresh"><button id="btn-refresh">重新整理</button></div>
    <div class="grid" id="kpi-cards"></div>
    <div class="section">
        <h2>CRM 轉換漏斗</h2>
        <div class="grid" id="crm-funnel"></div>
    </div>
    <div class="section">
        <h2>每日事件</h2>
        <table id="events-table">
            <thead><tr><th>日期</th><th>發信</th><th>開信</th><th>點擊</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="crm-database.js"></script>
    <script src="kpi-dashboard.js"></script>
</body>
</html>
